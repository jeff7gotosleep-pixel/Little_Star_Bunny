<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Star Bunny</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">Little Star Bunny</div>

<div class="search">
<img src="img/lupa.svg" alt="Buscar">
</div>

</header>


<div class="nav">

<a href="name.html">Últimas noticias</a>
<a href="temporada.html">Calendario de temporada</a>
<a href="articulos.html">Artículos</a>
<a href="tests.html">Tests</a>
<a href="guias.html">Guías</a>
<a href="entrevistas.html">Entrevistas</a>
<a href="mas.html">Más</a>
<a href="acerca.html">Acerca</a>

</div>


<div id="orangeLine" class="orange-line"></div>


<div class="banner" id="bannerLink">
<img id="bannerImg">
</div>


<div class="container">

<div class="news-layout">

<div class="left-column">

<div id="oneNews"></div>

<div id="twoNews"></div>

</div>

<div class="right-column">

<div id="threeNews"></div>

</div>

</div>

</div>


<script>

/* =========================
CONFIGURACION PAGINA
========================= */

const pagina = {

orangeLine:{
pc:"https://littlestarbunny.wordpress.com/wp-content/uploads/2026/03/franja_final.png?w=1440&allow_lossy=1",
cell:"https://littlestarbunny.wordpress.com/wp-content/uploads/2026/03/watergren_cell.png?allow_lossy=1"
},

banner:{
img:"img/Uzaki-Chan.svg",
ruta:"noticia-principal.html"
},

One_News:[

{
Imagen:"https://informatiom0.wordpress.com/wp-content/uploads/2026/03/jim-carrey.png?allow_lossy=1",
texto:["¿Jim Carrey Es un Clon?"],
Fecha:["8 de marzo"],
Ruta:"JimClon.html"
}

],

Two_News:[

{
Imagen:"https://littlestarbunny.wordpress.com/wp-content/uploads/2026/03/g.png?allow_lossy=1",
texto:["Noticia sobre el villano Shawl"],
Fecha:["8 de marzo","12:22"],
Ruta:"ShawlVillain.html"
},

{
Imagen:"https://littlestarbunny.wordpress.com/wp-content/uploads/2026/03/g.png?allow_lossy=1",
texto:["Nueva historia del universo Hero"],
Fecha:[],
Ruta:"HeroWorld.html"
}

],

Three_News:[

{
Imagen:"https://littlestarbunny.wordpress.com/wp-content/uploads/2026/03/g.png?allow_lossy=1",
texto:["¿Jim Carrey Es un Clon?"],
Fecha:["8 de marzo"],
Ruta:"JimClon.html"
},

{
Imagen:"https://littlestarbunny.wordpress.com/wp-content/uploads/2026/03/g.png?allow_lossy=1",
texto:["Noticia sobre el villano Shawl"],
Fecha:["8 de marzo","12:22"],
Ruta:"ShawlVillain.html"
},

{
Imagen:"https://littlestarbunny.wordpress.com/wp-content/uploads/2026/03/g.png?allow_lossy=1",
texto:["Nueva historia del universo Hero"],
Fecha:[],
Ruta:"HeroWorld.html"
}

]

}


/* =========================
DETECTAR DISPOSITIVO
========================= */

function esCelular(){
return window.innerWidth <= 768;
}


/* =========================
CARGAR IMAGENES
========================= */

function cargarImagenes(){

const orange = document.getElementById("orangeLine");
const bannerImg = document.getElementById("bannerImg");

bannerImg.src = pagina.banner.img;

if(esCelular()){
orange.style.backgroundImage=`url(${pagina.orangeLine.cell})`;
}else{
orange.style.backgroundImage=`url(${pagina.orangeLine.pc})`;
}

}

cargarImagenes();
window.addEventListener("resize",cargarImagenes);


/* =========================
CLICK BANNER
========================= */

document.getElementById("bannerLink").onclick=()=>{
window.location.href=pagina.banner.ruta;
};


/* =========================
ONE NEWS (NOTICIA GRANDE)
========================= */

const oneContainer=document.getElementById("oneNews");

pagina.One_News.forEach(n=>{

let fechaHTML="";

if(n.Fecha && n.Fecha.length){
fechaHTML=`<div class="news-date">${n.Fecha.join(" ")}</div>`;
}

const card=document.createElement("div");

card.className="news-card big-news";

card.innerHTML=`

<img src="${n.Imagen}" onclick="window.location.href='${n.Ruta}'">

<div class="news-info">

<h2 onclick="window.location.href='${n.Ruta}'">
${n.texto.join("")}
</h2>

${fechaHTML}

</div>

`;

oneContainer.appendChild(card);

});


/* =========================
TWO NEWS
========================= */

const twoContainer=document.getElementById("twoNews");

pagina.Two_News.forEach(n=>{

let fechaHTML="";

if(n.Fecha && n.Fecha.length){
fechaHTML=`<div class="news-date">${n.Fecha.join(" ")}</div>`;
}

const card=document.createElement("div");

card.className="small-news";

card.innerHTML=`

<img src="${n.Imagen}" onclick="window.location.href='${n.Ruta}'">

<h3 onclick="window.location.href='${n.Ruta}'">
${n.texto.join("")}
</h3>

${fechaHTML}

`;

twoContainer.appendChild(card);

});


/* =========================
THREE NEWS
========================= */

const threeContainer=document.getElementById("threeNews");

pagina.Three_News.forEach(n=>{

let fechaHTML="";

if(n.Fecha && n.Fecha.length){
fechaHTML=`<div class="news-date">${n.Fecha.join(" ")}</div>`;
}

const card=document.createElement("div");

card.className="small-news";

card.innerHTML=`

<img src="${n.Imagen}" onclick="window.location.href='${n.Ruta}'">

<h3 onclick="window.location.href='${n.Ruta}'">
${n.texto.join("")}
</h3>

${fechaHTML}

`;

threeContainer.appendChild(card);

});

</script>

</body>
</html>
