<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Little Star Bunny</title>

<style>

/* ===== BASE ===== */

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#000;
color:white;
}

/* ===== HEADER ===== */

header{
background:#0b0b0b;
padding:15px 40px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid #222;
}

.logo{
font-size:28px;
font-weight:bold;
}

.search{
cursor:pointer;
display:flex;
align-items:center;
}

.search img{
width:24px;
height:24px;
}

/* ===== MENU ===== */

.nav{
display:flex;
gap:25px;
padding:10px 40px;
background:#000;
font-weight:bold;
flex-wrap:wrap;
}

.nav a{
color:white;
text-decoration:none;
font-size:15px;
}

.nav a:hover{
color:#27F5C2;
}

/* ===== LINEA ===== */

.orange-line{
width:100%;
height:4px;
background-size:cover;
}

/* ===== BANNER ===== */

.banner{
width:100%;
background:#000;
cursor:pointer;
overflow:hidden;
}

.banner img{
width:100%;
height:100%;
object-fit:cover;
display:block;
aspect-ratio:1440/180;
}

/* ===== CONTENIDO ===== */

.container{
padding:40px;
max-width:1400px;
margin:auto;
}

/* ===== IMAGEN GRANDE ===== */

.big-image{
display:flex;
justify-content:center;
margin-bottom:40px;
}

.big-image img{
max-width:900px;
width:100%;
border-radius:10px;
cursor:pointer;
}

/* ===== PANTALLA COMPLETA ===== */

.fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}

.fullscreen img{
max-width:95%;
max-height:95%;
}

/* ===== TEXTING ===== */

.texting-section{
margin-top:40px;
}

/* GRID 3 COLUMNAS */

.texting-grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:30px;
}

#text-left,
#text-center,
#text-right{
display:flex;
flex-direction:column;
gap:30px;
}

/* BLOQUES */

.text-block{
background:transparent;
padding:20px;
border-radius:10px;
}

.text-block h3{
margin-top:0;
color:#27F5C2;
}

.text-links a{
display:inline-block;
margin-right:12px;
margin-top:6px;
font-weight:bold;
color:#EEE0F7;
text-decoration:none;
}

.text-links a:hover{
text-decoration:underline;
color:white;
}

.text-images img{
width:100%;
margin-top:15px;
border-radius:10px;
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){

.texting-grid{
grid-template-columns:1fr;
}

}

@media(max-width:768px){

.banner img{
aspect-ratio:370/60;
}

.search img{
width:32px;
height:32px;
}

.container{
padding:20px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">Little Star Bunny</div>

<div class="search">
<img src="img/lupa.svg" alt="Buscar">
</div>

</header>

<div class="nav">

<a href="index.html">Index</a>
<a href="Articulos.html">Artículos</a>
<a href="Anotaciones.html">Tablon De Anotaciones</a>
<a href="Hours.html">Horarios Explicados</a>
<a href="Extra.html">Más</a>

</div>

<div id="orangeLine" class="orange-line"></div>

<div class="banner" id="bannerLink">
<img id="bannerImg">
</div>

<div class="container">

<div id="oneNews" class="big-image"></div>

<div class="texting-section">

<h2>Texting:</h2>

<div class="texting-grid">

<div id="text-left"></div>
<div id="text-center"></div>
<div id="text-right"></div>

</div>

</div>

</div>

<script>

/* TODO TU JS SIGUE EXACTAMENTE IGUAL */

</script>

</body>
</html>
